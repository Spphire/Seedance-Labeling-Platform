<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Seedance 数据标注平台</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f6f7f9;
      --panel: #ffffff;
      --ink: #1b1f24;
      --muted: #69707a;
      --line: #d8dde4;
      --accent: #176b87;
      --accent-ink: #ffffff;
      --ok: #1c7c54;
      --warn: #9f6a00;
      --bad: #b42318;
      --focus: #dff4ff;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--ink);
      font-family: "Segoe UI", "Microsoft YaHei", Arial, sans-serif;
      font-size: 14px;
    }

    button, input, textarea, select {
      font: inherit;
    }

    button {
      min-height: 34px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #fff;
      color: var(--ink);
      padding: 0 12px;
      cursor: pointer;
      white-space: nowrap;
    }

    button:hover {
      border-color: var(--accent);
    }

    button.primary {
      background: var(--accent);
      border-color: var(--accent);
      color: var(--accent-ink);
    }

    button.good {
      background: var(--ok);
      border-color: var(--ok);
      color: #fff;
    }

    button.bad {
      background: var(--bad);
      border-color: var(--bad);
      color: #fff;
    }

    button.warn {
      background: var(--warn);
      border-color: var(--warn);
      color: #fff;
    }

    button:disabled {
      opacity: 0.45;
      cursor: default;
    }

    textarea, input, select {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #fff;
      color: var(--ink);
      padding: 8px 10px;
    }

    textarea {
      min-height: 116px;
      resize: vertical;
      line-height: 1.45;
    }

    .shell {
      height: 100vh;
      display: grid;
      grid-template-columns: 340px minmax(0, 1fr);
      grid-template-rows: 54px minmax(0, 1fr);
    }

    .shell.admin-route {
      grid-template-columns: minmax(0, 1fr);
    }

    header {
      grid-column: 1 / -1;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 0 18px;
      background: #1f2933;
      color: #fff;
      border-bottom: 1px solid #111820;
    }

    header h1 {
      margin: 0;
      font-size: 18px;
      font-weight: 650;
      letter-spacing: 0;
    }

    .header-actions {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .header-actions input {
      width: 230px;
      height: 34px;
      background: #111820;
      border-color: #3d4854;
      color: #fff;
    }

    .header-actions .reviewer {
      width: 160px;
    }

    .icon-button {
      width: 36px;
      min-width: 36px;
      padding: 0;
      font-size: 18px;
      line-height: 1;
    }

    .modal-overlay {
      position: fixed;
      inset: 0;
      z-index: 20;
      display: flex;
      justify-content: flex-end;
      background: rgba(17, 24, 32, 0.38);
    }

    .modal-overlay.hidden {
      display: none;
    }

    .admin-panel {
      width: min(440px, 100vw);
      height: 100%;
      overflow: auto;
      padding: 18px;
      background: var(--panel);
      color: var(--ink);
      border-left: 1px solid var(--line);
      box-shadow: -18px 0 34px rgba(0, 0, 0, 0.16);
    }

    .admin-panel h2 {
      margin: 0 0 16px;
      font-size: 16px;
    }

    .field {
      margin-bottom: 14px;
    }

    .field label {
      display: block;
      margin-bottom: 6px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 650;
    }

    .hint {
      margin-top: 5px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.35;
    }

    .route-link {
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
      text-decoration: none;
    }

    .route-link.active {
      color: #ffffff;
    }

    .usage-panel {
      display: grid;
      gap: 8px;
      margin-top: 8px;
    }

    .usage-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 8px;
      padding: 8px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #f8fafc;
      font-size: 12px;
    }

    .usage-row strong {
      display: block;
      margin-bottom: 3px;
    }

    .ref-image-order {
      display: grid;
      gap: 8px;
    }

    .ref-image-row {
      display: grid;
      grid-template-columns: 56px minmax(0, 1fr) 56px;
      gap: 8px;
      align-items: center;
    }

    .ref-image-row span {
      color: var(--muted);
      font-size: 12px;
      font-weight: 650;
      white-space: nowrap;
    }

    .ref-preview {
      width: 56px;
      aspect-ratio: 1 / 1;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #f1f3f5;
      object-fit: cover;
    }

    .admin-actions {
      display: flex;
      gap: 8px;
      justify-content: flex-end;
      margin-top: 18px;
    }

    aside {
      overflow: auto;
      border-right: 1px solid var(--line);
      background: var(--panel);
      padding: 14px;
    }

    .shell.admin-route aside {
      display: none;
    }

    main {
      min-width: 0;
      display: grid;
      grid-template-rows: 43px minmax(0, 1fr) 116px;
      background: var(--bg);
    }

    .shell.admin-route main {
      grid-column: 1 / -1;
    }

    .shell.admin-route .tabs {
      display: none;
    }

    .shell.admin-route main {
      grid-template-rows: minmax(0, 1fr) 116px;
    }

    .block {
      margin-bottom: 14px;
    }

    .block h2 {
      margin: 0 0 8px;
      font-size: 13px;
      color: var(--muted);
      font-weight: 650;
    }

    .row {
      display: flex;
      gap: 8px;
      align-items: center;
      margin-top: 8px;
    }

    .row > * {
      flex: 1;
    }

    .row > button,
    .row > select {
      flex: 0 0 auto;
    }

    .episode-list, .clip-list {
      display: grid;
      gap: 8px;
    }

    .item {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 9px;
      background: #fff;
    }

    .item.active {
      border-color: var(--accent);
      background: var(--focus);
    }

    .item.stitching {
      border-color: var(--accent);
      background: #eef9fc;
    }

    .item.final-ready {
      border-color: #a7e0c8;
    }

    .item.needs-attention {
      border-color: #f3c26b;
      background: #fffaf0;
    }

    .item-title {
      display: flex;
      justify-content: space-between;
      gap: 8px;
      font-weight: 650;
      font-size: 13px;
    }

    .item-title span:first-child {
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .meta {
      color: var(--muted);
      font-size: 12px;
      margin-top: 5px;
      overflow-wrap: anywhere;
    }

    .episode-stage {
      margin-top: 7px;
      font-weight: 650;
      color: #354252;
    }

    .episode-facts {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 7px;
    }

    .progress {
      height: 6px;
      overflow: hidden;
      border-radius: 999px;
      background: #eef2f6;
      margin-top: 8px;
    }

    .progress span {
      display: block;
      height: 100%;
      width: 0;
      background: var(--ok);
      transition: width 0.2s ease;
    }

    .progress.running span {
      background: var(--accent);
    }

    .episode-actions {
      display: flex;
      gap: 6px;
      margin-top: 8px;
      flex-wrap: wrap;
    }

    .episode-actions a,
    .episode-actions button {
      min-height: 28px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #fff;
      color: var(--ink);
      padding: 0 8px;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      font-size: 12px;
      cursor: pointer;
    }

    .episode-actions a:hover,
    .episode-actions button:hover {
      border-color: var(--accent);
    }

    .tabs {
      display: flex;
      overflow-x: auto;
      border-bottom: 1px solid var(--line);
      background: #fff;
    }

    .tab {
      min-width: 150px;
      max-width: 240px;
      height: 42px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      padding: 0 10px;
      border-right: 1px solid var(--line);
      cursor: pointer;
      background: #fff;
    }

    .tab.active {
      background: var(--focus);
      border-bottom: 2px solid var(--accent);
    }

    .tab span {
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .tab button {
      min-height: 24px;
      width: 24px;
      padding: 0;
      border-radius: 50%;
      color: var(--muted);
    }

    .workspace {
      min-height: 0;
      overflow: auto;
      padding: 16px;
    }

    .empty {
      height: 100%;
      min-height: 360px;
      display: grid;
      place-items: center;
      color: var(--muted);
      text-align: center;
    }

    .admin-dashboard {
      display: grid;
      gap: 16px;
      max-width: 1280px;
      margin: 0 auto;
    }

    .metric-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 10px;
    }

    .metric {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      padding: 12px;
    }

    .metric span {
      display: block;
      color: var(--muted);
      font-size: 12px;
      font-weight: 650;
    }

    .metric strong {
      display: block;
      margin-top: 6px;
      font-size: 24px;
      letter-spacing: 0;
    }

    .admin-section {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      padding: 14px;
    }

    .admin-section h3 {
      margin: 0;
      font-size: 15px;
    }

    .admin-section-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 10px;
    }

    .admin-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }

    .admin-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 12px;
    }

    .admin-table th,
    .admin-table td {
      border-bottom: 1px solid var(--line);
      padding: 8px 6px;
      text-align: left;
      vertical-align: top;
      overflow-wrap: anywhere;
    }

    .admin-table th {
      color: var(--muted);
      font-weight: 650;
    }

    .review-head {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 14px;
      margin-bottom: 14px;
    }

    .review-title {
      min-width: 0;
    }

    .review-title h2 {
      margin: 0 0 4px;
      font-size: 20px;
      letter-spacing: 0;
    }

    .actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .videos {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
      align-items: start;
    }

    .video-pane {
      background: #0f1419;
      border: 1px solid #111820;
      border-radius: 8px;
      overflow: hidden;
    }

    .video-pane h3 {
      height: 34px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin: 0;
      padding: 0 10px;
      color: #e5e9ef;
      font-size: 13px;
      font-weight: 650;
      background: #1f2933;
    }

    video {
      display: block;
      width: 100%;
      aspect-ratio: 4 / 3;
      background: #000;
    }

    .notice {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      color: #354252;
      padding: 10px 12px;
      margin-bottom: 14px;
    }

    .notice.stitching {
      border-color: #9cd7ec;
      background: #eef9fc;
    }

    .notice.failed {
      border-color: #f3aaa6;
      background: #fff1f0;
    }

    .notice.locked {
      border-color: #f3c26b;
      background: #fffaf0;
    }

    .statusbar {
      border-top: 1px solid var(--line);
      background: #fff;
      padding: 10px 14px;
      overflow: auto;
      white-space: pre-wrap;
      color: var(--muted);
      font-family: Consolas, "Segoe UI", monospace;
      font-size: 12px;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      min-height: 22px;
      border-radius: 999px;
      padding: 0 8px;
      font-size: 12px;
      background: #eef2f6;
      color: #354252;
      white-space: nowrap;
    }

    .badge.accepted {
      background: #def7ec;
      color: #03543f;
    }

    .badge.ready {
      background: #def7ec;
      color: #03543f;
    }

    .badge.failed,
    .badge.damaged,
    .badge.rejected {
      background: #fde8e8;
      color: #9b1c1c;
    }

    .badge.generated,
    .badge.generating {
      background: #e1effe;
      color: #1e429f;
    }

    .badge.stitching {
      background: #e1effe;
      color: #1e429f;
    }

    .badge.stitching::before {
      content: "";
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: currentColor;
      margin-right: 6px;
      animation: pulse 1s ease-in-out infinite;
    }

    .badge.stale,
    .badge.missing,
    .badge.pending {
      background: #eef2f6;
      color: #354252;
    }

    .badge.flagged {
      background: #fef3c7;
      color: #92400e;
    }

    .badge.locked {
      background: #fef3c7;
      color: #92400e;
    }

    .badge.mine {
      background: #def7ec;
      color: #03543f;
    }

    @keyframes pulse {
      0%, 100% {
        opacity: 0.35;
      }

      50% {
        opacity: 1;
      }
    }

    @media (max-width: 980px) {
      .shell {
        grid-template-columns: 1fr;
        grid-template-rows: auto auto minmax(0, 1fr);
      }

      header {
        min-height: 54px;
        flex-wrap: wrap;
        padding: 10px 14px;
      }

      aside {
        max-height: 42vh;
        border-right: 0;
        border-bottom: 1px solid var(--line);
      }

      main {
        grid-template-rows: 43px minmax(0, 1fr) 116px;
      }

      .videos {
        grid-template-columns: 1fr;
      }

      .metric-grid,
      .admin-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div id="appShell" class="shell">
    <header>
      <h1>Seedance 数据标注平台</h1>
      <div class="header-actions">
        <a id="labelRoute" class="route-link" href="/label">标注</a>
        <a id="adminRoute" class="route-link" href="/admin">管理员</a>
        <input id="reviewerName" class="reviewer" placeholder="审核人">
        <button id="openSettings" class="icon-button" title="设置" aria-label="设置">&#9881;</button>
        <button id="refresh" class="primary">刷新</button>
      </div>
    </header>

    <div id="settingsOverlay" class="modal-overlay hidden">
      <section class="admin-panel" role="dialog" aria-modal="true" aria-labelledby="settingsTitle">
        <h2 id="settingsTitle">后台管理员设置</h2>
        <div class="field">
          <label for="dm3Host">数据服务器</label>
          <input id="dm3Host" placeholder="DM3data">
        </div>
        <div class="field">
          <label for="dm3NedfRoot">原数据路径</label>
          <input id="dm3NedfRoot" placeholder="/mnt/nm_data/data/nedf">
        </div>
        <div class="field">
          <label for="publicBaseUrl">Clip 访问地址</label>
          <input id="publicBaseUrl" placeholder="http://106.14.2.243:18080">
        </div>
        <div class="field">
          <label for="seedanceApiKey">Seedance API Key</label>
          <input id="seedanceApiKey" type="password" autocomplete="off" placeholder="留空则不修改">
          <div id="seedanceApiKeyHint" class="hint"></div>
        </div>
        <div class="field">
          <label for="defaultPrompt">默认 Prompt</label>
          <textarea id="defaultPrompt" spellcheck="false"></textarea>
        </div>
        <div class="field">
          <label>参考图顺序</label>
          <div id="referenceImageOrder" class="ref-image-order"></div>
          <div class="hint">按顺序对应 prompt 中的 @图片1、@图片2、@图片3、@图片4。</div>
        </div>
        <div class="field">
          <label for="seedanceModel">Seedance 模型</label>
          <input id="seedanceModel" placeholder="doubao-seedance-2-0-fast-260128">
        </div>
        <div class="field">
          <label for="seedanceBaseUrl">Seedance Base URL</label>
          <input id="seedanceBaseUrl" placeholder="https://ark.cn-beijing.volces.com/api/v3">
        </div>
        <div class="row">
          <div class="field">
            <label for="seedanceResolution">分辨率</label>
            <select id="seedanceResolution">
              <option value="480p">480p</option>
              <option value="720p">720p</option>
            </select>
          </div>
          <div class="field">
            <label for="seedanceRatio">画面比例</label>
            <input id="seedanceRatio" placeholder="4:3">
          </div>
        </div>
        <div class="row">
          <div class="field">
            <label for="seedanceConcurrency">并发数</label>
            <input id="seedanceConcurrency" type="number" min="1" step="1" placeholder="3">
          </div>
          <div class="field">
            <label for="seedanceSecondsPerVideoSecond">预计耗时倍数</label>
            <input id="seedanceSecondsPerVideoSecond" type="number" min="1" step="1" placeholder="24">
          </div>
        </div>
        <div class="field">
          <label>Seedance 用量监控</label>
          <button id="refreshUsage">刷新用量</button>
          <div id="seedanceUsageSummary" class="usage-panel"></div>
          <div id="seedanceUsageRecent" class="usage-panel"></div>
        </div>
        <div class="admin-actions">
          <button id="closeSettings">关闭</button>
          <button id="saveSettings" class="primary">保存配置</button>
        </div>
      </section>
    </div>

    <div id="runSettingsOverlay" class="modal-overlay hidden">
      <section class="admin-panel" role="dialog" aria-modal="true" aria-labelledby="runSettingsTitle">
        <h2 id="runSettingsTitle">本次生成设置</h2>
        <div class="field">
          <label for="generationMode">本次运行模式</label>
          <select id="generationMode">
            <option value="mock">mock（默认，不消耗额度）</option>
            <option value="seedance">seedance（真实消耗额度）</option>
          </select>
          <div class="hint">每次打开页面默认 mock；右侧重跑也会使用这里的模式。</div>
        </div>
        <div class="field">
          <label for="runPrompt">本次 Prompt</label>
          <textarea id="runPrompt" spellcheck="false"></textarea>
        </div>
        <div class="field">
          <label>本次参考图顺序</label>
          <div id="runReferenceImageOrder" class="ref-image-order"></div>
          <div class="hint">这里只影响本次生成/重跑；管理员默认值在 /admin 中保存。</div>
        </div>
        <div class="admin-actions">
          <button id="resetRunDefaults">恢复默认</button>
          <button id="closeRunSettings" class="primary">完成</button>
        </div>
      </section>
    </div>

    <aside id="labelSidebar">
      <section class="block">
        <h2>批量 episode</h2>
        <textarea id="episodeText" spellcheck="false" placeholder="c412f233-549f-43cd-89c3-af0b496ae742"></textarea>
        <div class="row">
          <button id="submitPreprocess" class="primary">提交并预处理</button>
        </div>
        <div class="row">
          <input id="headVideoPath" placeholder="已有 head MP4 路径">
          <button id="importHead">导入</button>
        </div>
        <div id="runSettingsSummary" class="hint"></div>
        <div class="row">
          <button id="generate">生成</button>
          <button id="dryRun">dry-run</button>
        </div>
        <div class="row">
          <button id="autoAccept">全部保留</button>
        </div>
      </section>

      <section class="block">
        <h2>Episodes</h2>
        <div id="episodeList" class="episode-list"></div>
      </section>

      <section class="block">
        <h2>Clips</h2>
        <div id="clipList" class="clip-list"></div>
      </section>
    </aside>

    <main>
      <nav id="tabs" class="tabs"></nav>
      <section id="workspace" class="workspace">
        <div class="empty">选择一个 episode 查看完整视频，或选择一个 clip 开始审核</div>
      </section>
      <div id="status" class="statusbar">ready</div>
    </main>
  </div>

  <script>
    const state = {
      episodes: [],
      clips: [],
      jobs: [],
      locks: [],
      settings: {},
      seedanceUsage: null,
      reviewerActivity: null,
      route: location.pathname.startsWith("/admin") ? "admin" : "label",
      tabs: [],
      activeClipId: null,
      selectedEpisode: null,
      pollTimer: null,
      renewTimer: null,
      clientId: "",
      reviewerName: "",
      clipLocks: {},
      workspaceSignature: "",
      settingsDirty: false,
      runDefaultsInitialized: false,
    };

    const $ = (id) => document.getElementById(id);
    const statusEl = $("status");
    window.__seedanceState = state;

    function initIdentity() {
      let clientId = localStorage.getItem("seedance_client_id");
      if (!clientId) {
        clientId = `client-${crypto.randomUUID ? crypto.randomUUID() : Math.random().toString(36).slice(2)}`;
        localStorage.setItem("seedance_client_id", clientId);
      }
      let reviewerName = localStorage.getItem("seedance_reviewer_name") || "";
      if (!reviewerName) {
        reviewerName = `审核员-${clientId.slice(-4)}`;
        localStorage.setItem("seedance_reviewer_name", reviewerName);
      }
      state.clientId = clientId;
      state.reviewerName = reviewerName;
      $("reviewerName").value = reviewerName;
    }

    function updateReviewerName(value) {
      const name = value.trim() || `审核员-${state.clientId.slice(-4)}`;
      state.reviewerName = name;
      localStorage.setItem("seedance_reviewer_name", name);
      $("reviewerName").value = name;
    }

    function operatorPayload() {
      return { operator_id: state.clientId, operator_name: state.reviewerName };
    }

    function generationContentPayload() {
      return {
        ...operatorPayload(),
        prompt: $("runPrompt").value.trim() || state.settings.default_prompt || "",
        reference_images: selectedReferenceImages("run"),
      };
    }

    function applyRouteMode() {
      $("appShell").classList.toggle("admin-route", state.route === "admin");
      $("labelRoute").classList.toggle("active", state.route === "label");
      $("adminRoute").classList.toggle("active", state.route === "admin");
      $("openSettings").title = state.route === "admin" ? "后台管理员设置" : "本次生成设置";
      $("openSettings").setAttribute("aria-label", $("openSettings").title);
      $("settingsOverlay").classList.add("hidden");
      $("runSettingsOverlay").classList.add("hidden");
    }

    function log(message, data) {
      const suffix = data === undefined ? "" : "\n" + JSON.stringify(data, null, 2);
      statusEl.textContent = `${new Date().toLocaleTimeString()}  ${message}${suffix}`;
    }

    async function api(path, options = {}) {
      const opts = { ...options };
      opts.headers = { "Content-Type": "application/json", ...(opts.headers || {}) };
      if (opts.body && typeof opts.body !== "string") {
        opts.body = JSON.stringify(opts.body);
      }
      const res = await fetch(path, opts);
      const text = await res.text();
      let data = null;
      if (text) {
        try {
          data = JSON.parse(text);
        } catch (err) {
          data = text;
        }
      }
      if (!res.ok) {
        const detail = data && data.detail ? data.detail : text;
        const err = new Error(typeof detail === "string" ? detail : JSON.stringify(detail));
        err.status = res.status;
        err.detail = detail;
        throw err;
      }
      return data;
    }

    async function refresh(options = {}) {
      const data = await api("/api/state");
      state.episodes = data.episodes || [];
      state.clips = data.clips || [];
      state.jobs = data.jobs || [];
      state.locks = data.locks || [];
      state.settings = data.settings || {};
      state.availableReferenceImages = state.settings.available_reference_images || [];
      if (state.route === "admin") {
        await loadAdminData({ render: false }).catch((err) => log(formatApiError(err)));
      }
      if (!$("generationMode").dataset.initialized) {
        $("generationMode").value = "mock";
        $("generationMode").dataset.initialized = "1";
      }
      if (!state.settingsDirty) {
        syncSettingsForm();
      }
      if (!state.runDefaultsInitialized) {
        syncRunFormFromDefaults();
      }
      reconcileLocks();
      render(options);
      log("state refreshed");
      schedulePolling();
      scheduleRenewals();
    }

    function syncSettingsForm() {
      $("dm3Host").value = state.settings.dm3_host || "DM3data";
      $("dm3NedfRoot").value = state.settings.dm3_nedf_root || "/mnt/nm_data/data/nedf";
      $("publicBaseUrl").value = state.settings.public_base_url || "";
      $("seedanceApiKey").value = "";
      $("seedanceApiKeyHint").textContent = state.settings.seedance_api_key_set ? "服务器已保存 API Key；留空不会覆盖。" : "尚未保存 API Key。";
      $("defaultPrompt").value = state.settings.default_prompt || "";
      renderReferenceImageSelectors("referenceImageOrder", state.settings.reference_images || [], "settings", markSettingsDirty);
      $("seedanceModel").value = state.settings.seedance_model || "doubao-seedance-2-0-fast-260128";
      $("seedanceBaseUrl").value = state.settings.seedance_base_url || "https://ark.cn-beijing.volces.com/api/v3";
      $("seedanceResolution").value = state.settings.seedance_resolution || "480p";
      $("seedanceRatio").value = state.settings.seedance_ratio || "4:3";
      $("seedanceConcurrency").value = state.settings.seedance_concurrency || 3;
      $("seedanceSecondsPerVideoSecond").value = state.settings.seedance_seconds_per_video_second || 24;
    }

    function syncRunFormFromDefaults() {
      $("runPrompt").value = state.settings.default_prompt || "";
      renderReferenceImageSelectors("runReferenceImageOrder", state.settings.reference_images || [], "run", updateRunSettingsSummary);
      state.runDefaultsInitialized = true;
      updateRunSettingsSummary();
    }

    function updateRunSettingsSummary() {
      const prompt = $("runPrompt").value.trim();
      const defaultPrompt = state.settings.default_prompt || "";
      const promptLabel = prompt === defaultPrompt ? "默认 Prompt" : "本次 Prompt 已调整";
      const refCount = selectedReferenceImages("run").length;
      $("runSettingsSummary").textContent = `${$("generationMode").value || "mock"} · ${promptLabel} · ${refCount} 张 ref 图`;
    }

    function shortUuid(uuid) {
      return uuid ? `${uuid.slice(0, 8)}...${uuid.slice(-6)}` : "";
    }

    function badge(status, label) {
      return `<span class="badge ${status || ""}">${label || status || "unknown"}</span>`;
    }

    function episodeBadges(episode) {
      const values = [badge(episode.status || "unknown")];
      if (episode.preprocess_health === "damaged") {
        values.push(badge("damaged", "损坏"));
      }
      const finalStatus = episode.final_status || "";
      if (finalStatus && finalStatus !== "missing") {
        values.push(badge(finalStatus));
      }
      return values.join("");
    }

    function renderReferenceImageSelectors(targetId, selected, scope, onChange) {
      const target = $(targetId);
      const available = state.availableReferenceImages || [];
      target.innerHTML = "";
      for (let index = 0; index < 4; index += 1) {
        const value = selected[index] || available[index]?.id || "";
        const row = document.createElement("div");
        row.className = "ref-image-row";
        const options = [
          `<option value="">不使用</option>`,
          ...available.map((item) => `<option value="${escapeAttr(item.id)}" ${item.id === value ? "selected" : ""}>${escapeHtml(item.name)}</option>`),
        ].join("");
        row.innerHTML = `
          <span>图片${index + 1}</span>
          <select data-ref-image-scope="${scope}" data-ref-image-index="${index}">${options}</select>
          <img class="ref-preview" alt="" data-ref-preview="${scope}-${index}">
        `;
        target.appendChild(row);
      }
      target.querySelectorAll(`[data-ref-image-scope="${scope}"]`).forEach((select) => {
        select.addEventListener("change", () => {
          if (onChange) onChange();
          updateReferencePreviews(scope);
        });
      });
      updateReferencePreviews(scope);
    }

    function selectedReferenceImages(scope) {
      return [...document.querySelectorAll(`[data-ref-image-scope="${scope}"]`)]
        .sort((a, b) => Number(a.dataset.refImageIndex) - Number(b.dataset.refImageIndex))
        .map((select) => select.value)
        .filter(Boolean);
    }

    function updateReferencePreviews(scope) {
      const byId = new Map((state.availableReferenceImages || []).map((item) => [item.id, item]));
      document.querySelectorAll(`[data-ref-image-scope="${scope}"]`).forEach((select) => {
        const image = byId.get(select.value);
        const preview = document.querySelector(`[data-ref-preview="${scope}-${select.dataset.refImageIndex}"]`);
        if (!preview) return;
        if (image) {
          preview.src = image.url;
          preview.title = image.name;
          preview.style.visibility = "visible";
        } else {
          preview.removeAttribute("src");
          preview.removeAttribute("title");
          preview.style.visibility = "hidden";
        }
      });
    }

    function markSettingsDirty() {
      state.settingsDirty = true;
    }

    function escapeHtml(value) {
      return String(value).replace(/[&<>"']/g, (char) => ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        '"': "&quot;",
        "'": "&#39;",
      }[char]));
    }

    function escapeAttr(value) {
      return escapeHtml(value);
    }

    function myClipLock(clipId) {
      return state.clipLocks[String(clipId)] || null;
    }

    function isMine(lock) {
      return !!lock && lock.owner_id === state.clientId;
    }

    function lockText(lock) {
      if (!lock) return "";
      const seconds = Math.ceil(lock.expires_in_sec || 0);
      return `${lock.owner_name || "其他人"} 锁定中 · ${seconds}s`;
    }

    function clipCanEdit(clip) {
      return !!myClipLock(clip.id);
    }

    function reconcileLocks() {
      const serverLocks = new Map(
        (state.locks || [])
          .filter((lock) => lock.resource_type === "clip")
          .map((lock) => [String(lock.resource_id), lock])
      );
      Object.keys(state.clipLocks).forEach((clipId) => {
        const serverLock = serverLocks.get(clipId);
        if (!serverLock || !isMine(serverLock)) {
          delete state.clipLocks[clipId];
        }
      });
      state.clips.forEach((clip) => {
        const serverLock = serverLocks.get(String(clip.id));
        if (serverLock) {
          clip.lock = serverLock;
        }
      });
    }

    function lockPayload(resourceType, resourceId, force = false) {
      return {
        resource_type: resourceType,
        resource_id: String(resourceId),
        owner_id: state.clientId,
        owner_name: state.reviewerName,
        ttl_sec: 90,
        force,
      };
    }

    async function acquireClipLock(clipId, force = false) {
      try {
        const lock = await api("/api/locks/acquire", {
          method: "POST",
          body: lockPayload("clip", clipId, force),
        });
        state.clipLocks[String(clipId)] = lock;
        log(`clip ${clipId} locked by ${state.reviewerName}`);
        await refresh();
        return lock;
      } catch (err) {
        log(formatApiError(err));
        await refresh();
        return null;
      }
    }

    async function renewClipLock(clipId) {
      const lock = myClipLock(clipId);
      if (!lock) return null;
      try {
        const renewed = await api("/api/locks/renew", {
          method: "POST",
          body: { token: lock.token, owner_id: state.clientId, ttl_sec: 90 },
        });
        state.clipLocks[String(clipId)] = renewed;
        return renewed;
      } catch (err) {
        delete state.clipLocks[String(clipId)];
        log(formatApiError(err));
        await refresh();
        return null;
      }
    }

    async function releaseClipLock(clipId) {
      const lock = myClipLock(clipId);
      delete state.clipLocks[String(clipId)];
      if (!lock) return;
      try {
        await api("/api/locks/release", {
          method: "POST",
          body: { token: lock.token, owner_id: state.clientId },
        });
      } catch (err) {
        log(formatApiError(err));
      }
    }

    async function withEpisodeLock(uuid, task) {
      const lock = await api("/api/locks/acquire", {
        method: "POST",
        body: lockPayload("episode", uuid),
      });
      try {
        return await task(lock);
      } finally {
        await api("/api/locks/release", {
          method: "POST",
          body: { token: lock.token, owner_id: state.clientId },
        }).catch((err) => log(formatApiError(err)));
      }
    }

    function scheduleRenewals() {
      if (state.renewTimer) {
        clearTimeout(state.renewTimer);
        state.renewTimer = null;
      }
      if (!Object.keys(state.clipLocks).length) return;
      state.renewTimer = setTimeout(async () => {
        await Promise.all(Object.keys(state.clipLocks).map((clipId) => renewClipLock(clipId)));
        scheduleRenewals();
      }, 30000);
    }

    function formatApiError(err) {
      if (err && err.detail && typeof err.detail === "object") {
        return err.detail.lock ? `${err.detail.message}: ${lockText(err.detail.lock)}` : (err.detail.message || JSON.stringify(err.detail));
      }
      try {
        const parsed = JSON.parse(err.message);
        if (parsed.message) {
          return parsed.lock ? `${parsed.message}: ${lockText(parsed.lock)}` : parsed.message;
        }
      } catch {}
      return err.message;
    }

    function pct(value, total) {
      if (!total) return 0;
      return Math.max(0, Math.min(100, Math.round((value / total) * 100)));
    }

    function formatDuration(seconds) {
      if (seconds === null || seconds === undefined || Number.isNaN(Number(seconds))) return "-";
      const value = Math.max(0, Math.round(Number(seconds)));
      const minutes = Math.floor(value / 60);
      const rest = value % 60;
      return minutes ? `${minutes}m ${rest}s` : `${rest}s`;
    }

    function formatTimestamp(seconds) {
      if (!seconds) return "-";
      return new Date(Number(seconds) * 1000).toLocaleString();
    }

    async function loadSeedanceUsage(options = {}) {
      const data = await api("/api/usage/seedance?limit=50");
      state.seedanceUsage = data;
      if (options.render !== false) {
        renderSeedanceUsage();
        if (state.route === "admin") render({ forceWorkspace: true });
      }
      return data;
    }

    async function loadReviewerActivity(options = {}) {
      const data = await api("/api/reviews/activity?limit=50");
      state.reviewerActivity = data;
      if (options.render !== false && state.route === "admin") {
        render({ forceWorkspace: true });
      }
      return data;
    }

    async function loadAdminData(options = {}) {
      const [usage, reviews] = await Promise.all([
        loadSeedanceUsage({ render: false }),
        loadReviewerActivity({ render: false }),
      ]);
      if (options.render !== false && state.route === "admin") {
        render({ forceWorkspace: true });
      }
      return { usage, reviews };
    }

    function renderSeedanceUsage() {
      const data = state.seedanceUsage || {};
      const summaryTarget = $("seedanceUsageSummary");
      const recentTarget = $("seedanceUsageRecent");
      const summary = data.summary || [];
      const recent = data.recent_calls || [];
      summaryTarget.innerHTML = summary.length
        ? summary.map((row) => `
          <div class="usage-row">
            <div>
              <strong>${escapeHtml(row.operator_name || row.operator_id || "unknown")}</strong>
              <span>${Number(row.clip_count || 0)} clips · ${Number(row.call_count || 0)} calls · ${Number(row.succeeded_count || 0)} ok · ${Number(row.failed_count || 0)} failed</span>
            </div>
            <div>${formatDuration(row.requested_duration_sec || 0)}</div>
          </div>
        `).join("")
        : `<div class="hint">暂无真实 Seedance 调用记录。</div>`;
      recentTarget.innerHTML = recent.length
        ? recent.map((row) => `
          <div class="usage-row">
            <div>
              <strong>${escapeHtml(row.episode_uuid ? `${shortUuid(row.episode_uuid)} #${row.clip_index}` : `clip ${row.clip_id || "-"}`)}</strong>
              <span>${escapeHtml(row.operator_name || row.operator_id || "unknown")} · ${escapeHtml(row.status || "-")} · task ${escapeHtml(row.task_id || "-")} · usage ${row.usage ? "yes" : "none"}</span>
            </div>
            <div>${formatTimestamp(row.created_at)}</div>
          </div>
        `).join("")
        : "";
    }

    function countItems(items, predicate) {
      return items.reduce((total, item) => total + (predicate(item) ? 1 : 0), 0);
    }

    function usageSummaryRows() {
      const summary = state.seedanceUsage?.summary || [];
      return summary.length
        ? summary.map((row) => `
          <div class="usage-row">
            <div>
              <strong>${escapeHtml(row.operator_name || row.operator_id || "unknown")}</strong>
              <span>${Number(row.clip_count || 0)} clips · ${Number(row.call_count || 0)} calls · ${Number(row.succeeded_count || 0)} ok · ${Number(row.failed_count || 0)} failed</span>
            </div>
            <div>${formatDuration(row.requested_duration_sec || 0)}</div>
          </div>
        `).join("")
        : `<div class="hint">暂无真实 Seedance 调用记录。</div>`;
    }

    function reviewSummaryRows() {
      const summary = state.reviewerActivity?.summary || [];
      return summary.length
        ? summary.map((row) => `
          <div class="usage-row">
            <div>
              <strong>${escapeHtml(row.operator_name || row.operator_id || "unknown")}</strong>
              <span>${Number(row.review_count || 0)} reviews · ${Number(row.accept_count || 0)} accept · ${Number(row.reject_count || 0)} reject · ${Number(row.flag_count || 0)} flag</span>
            </div>
            <div>${formatTimestamp(row.last_reviewed_at)}</div>
          </div>
        `).join("")
        : `<div class="hint">暂无人工标注记录。</div>`;
    }

    function recentUsageTable() {
      const rows = state.seedanceUsage?.recent_calls || [];
      if (!rows.length) return `<div class="hint">暂无最近调用。</div>`;
      return `
        <table class="admin-table">
          <thead><tr><th>Clip</th><th>操作员</th><th>状态</th><th>Task</th><th>时间</th></tr></thead>
          <tbody>
            ${rows.slice(0, 12).map((row) => `
              <tr>
                <td>${escapeHtml(row.episode_uuid ? `${shortUuid(row.episode_uuid)} #${row.clip_index}` : `clip ${row.clip_id || "-"}`)}</td>
                <td>${escapeHtml(row.operator_name || row.operator_id || "unknown")}</td>
                <td>${escapeHtml(row.status || "-")}</td>
                <td>${escapeHtml(row.task_id || "-")}</td>
                <td>${formatTimestamp(row.created_at)}</td>
              </tr>
            `).join("")}
          </tbody>
        </table>
      `;
    }

    function recentReviewTable() {
      const rows = state.reviewerActivity?.recent_reviews || [];
      if (!rows.length) return `<div class="hint">暂无最近标注。</div>`;
      return `
        <table class="admin-table">
          <thead><tr><th>Clip</th><th>标注员</th><th>决策</th><th>Job</th><th>时间</th></tr></thead>
          <tbody>
            ${rows.slice(0, 12).map((row) => `
              <tr>
                <td>${escapeHtml(row.episode_uuid ? `${shortUuid(row.episode_uuid)} #${row.clip_index}` : `clip ${row.clip_id || "-"}`)}</td>
                <td>${escapeHtml(row.operator_name || row.operator_id || "unknown")}</td>
                <td>${escapeHtml(row.decision || "-")}</td>
                <td>${escapeHtml(row.job_id || "-")}</td>
                <td>${formatTimestamp(row.reviewed_at)}</td>
              </tr>
            `).join("")}
          </tbody>
        </table>
      `;
    }

    function locksTable() {
      const locks = state.locks || [];
      if (!locks.length) return `<div class="hint">当前没有锁。</div>`;
      return `
        <table class="admin-table">
          <thead><tr><th>资源</th><th>占用者</th><th>剩余</th></tr></thead>
          <tbody>
            ${locks.slice(0, 20).map((lock) => `
              <tr>
                <td>${escapeHtml(lock.resource_type)} · ${escapeHtml(lock.resource_id)}</td>
                <td>${escapeHtml(lock.owner_name || lock.owner_id || "-")}</td>
                <td>${formatDuration(lock.expires_in_sec || 0)}</td>
              </tr>
            `).join("")}
          </tbody>
        </table>
      `;
    }

    function jobsTable() {
      const jobs = state.jobs || [];
      if (!jobs.length) return `<div class="hint">暂无生成任务。</div>`;
      return `
        <table class="admin-table">
          <thead><tr><th>Job</th><th>Clip</th><th>模式</th><th>操作员</th><th>状态</th></tr></thead>
          <tbody>
            ${jobs.slice(0, 16).map((job) => `
              <tr>
                <td>${escapeHtml(job.id)}</td>
                <td>${escapeHtml(job.episode_uuid ? `${shortUuid(job.episode_uuid)} #${job.clip_index}` : job.clip_id || "-")}</td>
                <td>${escapeHtml(job.mode || "-")}</td>
                <td>${escapeHtml(job.operator_name || job.operator_id || "unknown")}</td>
                <td>${escapeHtml(job.status || "-")}</td>
              </tr>
            `).join("")}
          </tbody>
        </table>
      `;
    }

    function jobSummary(job) {
      if (!job) return "";
      if (job.status === "running") {
        return `job ${job.id} · 已耗时 ${formatDuration(job.elapsed_sec)} · 预计剩余 ${formatDuration(job.remaining_estimated_sec)}`;
      }
      if (job.status === "succeeded") {
        return `job ${job.id} · 完成耗时 ${formatDuration(job.elapsed_sec)} · ${Number(job.seconds_per_video_second || 0).toFixed(1)}s/视频秒`;
      }
      if (job.status === "failed") {
        return `job ${job.id} · 失败 · ${job.error || ""}`;
      }
      return `job ${job.id} · ${job.status}`;
    }

    function uuidsFromText(text) {
      const matches = text.match(/[0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{12}/g) || [];
      return [...new Set(matches.map((item) => item.toLowerCase()))];
    }

    function episodeClass(episode) {
      const classes = ["item"];
      if (state.selectedEpisode === episode.uuid) classes.push("active");
      if (episode.final_status === "stitching") classes.push("stitching");
      if (episode.final_status === "ready") classes.push("final-ready");
      if (episode.generated_failed_clip_count || episode.flagged_clip_count || episode.rejected_clip_count || episode.preprocess_health === "damaged") {
        classes.push("needs-attention");
      }
      return classes.join(" ");
    }

    function episodeStage(episode) {
      return episode.episode_stage || "等待处理";
    }

    function episodeFacts(episode) {
      const facts = [
        `${episode.accepted_clip_count || 0}/${episode.clip_count || 0} accepted`,
        `${episode.review_remaining_count || 0} 待处理`,
      ];
      if (episode.generating_clip_count) facts.push(`${episode.generating_clip_count} 生成中`);
      if (episode.generated_clip_count) facts.push(`${episode.generated_clip_count} 待审核`);
      if (episode.generated_failed_clip_count) facts.push(`${episode.generated_failed_clip_count} 失败`);
      if (episode.flagged_clip_count) facts.push(`${episode.flagged_clip_count} 标记问题`);
      if (episode.rejected_clip_count) facts.push(`${episode.rejected_clip_count} 已丢弃`);
      if (episode.preprocess_health === "damaged") facts.push(`损坏：${episode.preprocess_health_reason || "需要重新预处理"}`);
      return facts;
    }

    function schedulePolling() {
      if (state.pollTimer) {
        clearTimeout(state.pollTimer);
        state.pollTimer = null;
      }
      const hasActiveWork = state.episodes.some((episode) => episode.final_status === "stitching")
        || state.clips.some((clip) => clip.status === "generating");
      if (hasActiveWork) {
        state.pollTimer = setTimeout(() => {
          refresh().catch((err) => log(err.message));
        }, 1500);
      }
    }

    function renderEpisodes() {
      const target = $("episodeList");
      target.innerHTML = "";
      state.episodes.forEach((episode) => {
        const accepted = episode.accepted_clip_count || 0;
        const total = episode.clip_count || 0;
        const progress = pct(accepted, total);
        const div = document.createElement("div");
        div.className = episodeClass(episode);
        div.innerHTML = `

    function wireSync() {
      const original = $("originalVideo");
      const generated = $("generatedVideo");
      const pair = [original, generated].filter((video) => video && (video.currentSrc || video.getAttribute("src")));
      if (pair.length < 2) return;

      let syncing = false;
      const unlock = () => window.setTimeout(() => { syncing = false; }, 80);
      const peers = (source) => pair.filter((video) => video !== source);
      const isPlaying = (video) => !video.paused && !video.ended;
      const syncTime = (source, target, threshold = 0.08) => {
        if (!Number.isFinite(source.currentTime)) return;
        if (Math.abs(target.currentTime - source.currentTime) > threshold) {
          target.currentTime = source.currentTime;
        }
      };
      const syncPlaybackRate = (source) => {
        peers(source).forEach((target) => {
          if (target.playbackRate !== source.playbackRate) {
            target.playbackRate = source.playbackRate;
          }
        });
      };
      const syncPlaybackState = (source, target) => {
        if (isPlaying(source)) {
          if (target.paused) {
            target.play().catch(() => {});
          }
        } else {
          target.pause();
        }
      };

      pair.forEach((video) => {
        video.addEventListener("play", () => {
          if (syncing) return;
          syncing = true;
          syncPlaybackRate(video);
          peers(video).forEach((target) => {
            syncTime(video, target);
            syncPlaybackState(video, target);
          });
          unlock();
        });
        video.addEventListener("pause", () => {
          if (syncing) return;
          syncing = true;
          peers(video).forEach((target) => {
            syncTime(video, target);
            syncPlaybackState(video, target);
          });
          unlock();
        });
        video.addEventListener("seeking", () => {
          if (syncing) return;
          syncing = true;
          peers(video).forEach((target) => {
            syncTime(video, target, 0);
            syncPlaybackState(video, target);
          });
          unlock();
        });
        video.addEventListener("seeked", () => {
          if (syncing) return;
          syncing = true;
          peers(video).forEach((target) => {
            syncTime(video, target, 0);
            syncPlaybackState(video, target);
          });
          unlock();
        });
        video.addEventListener("ratechange", () => {
          if (syncing) return;
          syncing = true;
          syncPlaybackRate(video);
          unlock();
        });
        video.addEventListener("timeupdate", () => {
          if (syncing || video.paused) return;
          peers(video).forEach((target) => {
            syncTime(video, target, 0.25);
            syncPlaybackState(video, target);
          });
        });
      });
    }

            if (action === "rerun") {

                method: "POST",
                body: { lock_token: lock.token, mode, ...generationContentPayload() },
              });
              log(`${mode} rerun submitted`, result);
            } else {
              const decision = action === "accept" ? "accept" : action === "reject" ? "reject" : "flag";

                method: "POST",
                body: { decision, job_id: clip.latest_job_id, note: "", lock_token: lock.token, ...operatorPayload() },
              });
              log(`review ${decision}`, result);
            }
            await refresh();
          } catch (err) {
            log(err.message);
          } finally {
            button.disabled = false;
          }
        });
      });
    }

          reference_images: selectedReferenceImages("settings"),
          seedance_model: $("seedanceModel").value.trim() || "doubao-seedance-2-0-fast-260128",
          seedance_base_url: $("seedanceBaseUrl").value.trim() || "https://ark.cn-beijing.volces.com/api/v3",
          seedance_resolution: $("seedanceResolution").value || "480p",
          seedance_ratio: $("seedanceRatio").value.trim() || "4:3",
          seedance_concurrency: Math.max(1, Number.parseInt($("seedanceConcurrency").value, 10) || 3),
          seedance_seconds_per_video_second: Math.max(1, Number.parseFloat($("seedanceSecondsPerVideoSecond").value) || 24),
        };
        const apiKey = $("seedanceApiKey").value.trim();
        if (apiKey) {
          values.seedance_api_key = apiKey;
        }
        const result = await api("/api/settings", { method: "POST", body: { values } });
        log("settings saved", result);
        state.settingsDirty = false;
        $("settingsOverlay").classList.add("hidden");
        await refresh();
      } catch (err) {
        log(err.message);
      }
    });
    $("submitPreprocess").addEventListener("click", async () => {
      const lockTokens = {};
      try {
        const textUuids = uuidsFromText($("episodeText").value);
        let uuids = textUuids.length ? textUuids : (state.selectedEpisode ? [state.selectedEpisode] : []);
        if (!uuids.length) throw new Error("需要在文本框中填写 episode UUID，或先选择一个 episode");
        log("submit + preprocess running");
        for (const uuid of uuids) {
          const lock = await api("/api/locks/acquire", {
            method: "POST",
            body: lockPayload("episode", uuid),
          });
          lockTokens[uuid] = lock.token;
        }
        const result = await api("/api/pipeline/submit_preprocess", {
          method: "POST",
          body: { episodes_text: uuids.join("\n"), fetch_remote: true, lock_tokens: lockTokens },
        });
        log("submit + preprocess finished", result);
        await refresh();
      } catch (err) {
        log(formatApiError(err));
      } finally {
        await Promise.all(Object.values(lockTokens).map((token) => api("/api/locks/release", {
          method: "POST",
          body: { token, owner_id: state.clientId },
        }).catch((err) => log(formatApiError(err)))));
      }
    });
    $("importHead").addEventListener("click", async () => {
      try {
        const text = $("episodeText").value;
        const match = text.match(/[0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{12}/);
        if (!match) throw new Error("episode 文本里需要一个 UUID");
        const path = $("headVideoPath").value.trim();
        if (!path) throw new Error("需要填写已有 head MP4 路径");
        const uuid = match[0].toLowerCase();
        const result = await withEpisodeLock(uuid, (lock) => api("/api/pipeline/import_head", {
          method: "POST",
          body: { uuid, path, lock_token: lock.token },
        }));
        log("head video imported", result);
        await refresh();
      } catch (err) {
        log(formatApiError(err));
      }
    });
    $("generate").addEventListener("click", async () => {
      try {
        const mode = $("generationMode").value;
        const result = await api("/api/generation/run", { method: "POST", body: { mode, dry_run: false, ...generationContentPayload() } });
        log(`${mode} generation finished`, result);
        await refresh();
      } catch (err) {
        log(err.message);
      }
    });
    $("refreshUsage").addEventListener("click", async () => {
      try {
        const data = await loadSeedanceUsage();
        log("seedance usage refreshed", data.summary || []);
      } catch (err) {
        log(formatApiError(err));
      }
    });
    $("dryRun").addEventListener("click", async () => {
      try {
        const result = await api("/api/generation/run", { method: "POST", body: { mode: "seedance", dry_run: true, ...generationContentPayload() } });
        log("seedance dry-run payloads written", result);
        await refresh();
      } catch (err) {
        log(err.message);
      }
    });
    $("autoAccept").addEventListener("click", async () => {
      try {
        const result = await api("/api/test/auto_accept", { method: "POST", body: { uuid: state.selectedEpisode } });
        log("auto accept finished", result);
        await refresh();
      } catch (err) {
        log(err.message);
      }
    });

    refresh().catch((err) => log(err.message));
  </script>
</body>
</html>
